  - name: infrastructure
    rules:
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~".*api.*|.*ollama.*"}[5m]) * 100 > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Container CPU usage above 80%"
          description: "Container {{ $labels.name }} CPU usage has been above 80% for 3 minutes."

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~".*api.*|.*ollama.*"} / container_spec_memory_limit_bytes * 100 > 85
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage above 85%"
          description: "Container {{ $labels.name }} is using more than 85% of its memory limit."

