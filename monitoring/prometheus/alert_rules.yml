groups:
  - name: rag_latency
    rules:
      - alert: RAGHighLatency
        expr: histogram_quantile(0.95, rate(rag_latency_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RAG pipeline P95 latency above 30s"
          description: "The 95th percentile of RAG pipeline latency has exceeded 30 seconds for the last 2 minutes."

      - alert: RAGCriticalLatency
        expr: histogram_quantile(0.95, rate(rag_latency_seconds_bucket[5m])) > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAG pipeline P95 latency above 60s"
          description: "The 95th percentile of RAG pipeline latency has exceeded 60 seconds. Immediate investigation required."

      - alert: LLMHighLatency
        expr: histogram_quantile(0.95, rate(rag_llm_latency_seconds_bucket[5m])) > 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM inference P95 latency above 20s"
          description: "Ollama LLM inference latency is elevated, potentially affecting user experience."

